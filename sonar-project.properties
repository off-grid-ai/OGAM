sonar.projectKey=off-grid-ai_off-grid-ai-mobile
sonar.organization=off-grid-ai
sonar.host.url=https://sonarcloud.io

sonar.sources=src,android/app/src/main,ios
sonar.tests=__tests__,android/app/src/test,ios/OffgridMobileTests

# .github/** excluded from analysis: SonarCloud's GitHub-Actions analyzer flags `npm ci` without
# --ignore-scripts (S6505) as new-code vulnerabilities, but this CI installs the project's OWN pinned
# deps (npm ci from the committed lockfile) and REQUIRES lifecycle scripts (postinstall runs
# patch-package) — --ignore-scripts would break the build. Non-actionable here, so exclude CI config
# from the gate; product code (src/android/ios) stays fully scanned.
sonar.exclusions=**/node_modules/**,**/Pods/**,**/build/**,**/coverage/**,ios/build/**,android/build/**,website/**,.github/**
sonar.test.inclusions=__tests__/**,android/app/src/test/**,ios/OffgridMobileTests/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
