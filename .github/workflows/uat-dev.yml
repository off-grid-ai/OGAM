# UAT / internal-tester builds on merge to `dev` (or manual dispatch).
#
# OPTIONAL cloud path. The FAST path is local: `scripts/uat.sh` on your Mac (minutes).
# GitHub's free macOS runners are small — an iOS build here can take 30-90 min. Android on
# ubuntu is quick. Both upload to the EXISTING app (prod bundle id) — Android → Play
# "internal" track, iOS → TestFlight — via the same fastlane beta lanes scripts/uat.sh uses.
#
# Uses the credentials ALREADY stored as repo secrets (nothing new to add) — the same names
# the working release workflows consume:
#   Android: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS,
#            ANDROID_KEY_PASSWORD, PLAY_STORE_JSON_KEY
#   iOS:     ASC_API_KEY_P8, ASC_KEY_ID, ASC_ISSUER_ID (TestFlight upload)
#            IOS_CERTIFICATE_P12, IOS_CERTIFICATE_PASSWORD, IOS_PROVISION_PROFILE,
#            KEYCHAIN_PASSWORD (signing)
name: UAT build (dev → internal testers)

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      platform:
        description: Which platform(s) to build
        type: choice
        default: both
        options: [both, ios, android]

concurrency:
  group: uat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform != 'ios' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: npm ci
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: '3.3', bundler-cache: true }
      - name: Decode signing secrets
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "${{ secrets.PLAY_STORE_JSON_KEY }}" | base64 --decode > "$RUNNER_TEMP/play-key.json" \
            || printf '%s' '${{ secrets.PLAY_STORE_JSON_KEY }}' > "$RUNNER_TEMP/play-key.json"
      - name: Build signed AAB + upload to Play internal
        env:
          PLAY_STORE_JSON_KEY_PATH: ${{ runner.temp }}/play-key.json
          OFFGRID_UPLOAD_STORE_FILE: ${{ runner.temp }}/release.keystore
          OFFGRID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          OFFGRID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          OFFGRID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bundle exec fastlane android beta

  ios:
    # Slow on free macOS runners — see header. Skipped for android-only manual runs.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform != 'android' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: npm ci
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: '3.3', bundler-cache: true }
      - run: cd ios && pod install
      - name: Build signed IPA + upload to TestFlight
        env:
          # ASC auth: raw .p8 + key id + issuer (asc_api_key in the Fastfile builds the key).
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          # Signing (imported into a temp keychain by the Fastfile's setup_signing).
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE: ${{ secrets.IOS_PROVISION_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane ios beta
